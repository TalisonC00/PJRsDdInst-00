<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jornada Social 🌍</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --primary: #FF4B5C; --sky: #BAE6FD; --money: #10B981; --text: #1E293B; --sub: #64748B; --card: #FFFFFF; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--sky); margin: 0; padding: 0; overflow-x: hidden; color: var(--text); }

        /* HEADER PREMIUM */
        .header { background: #fff; padding: 12px 16px; display: flex; align-items: center; position: sticky; top: 0; z-index: 2000; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .header-title { flex: 1; text-align: center; margin-left: 40px; }
        .header-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); cursor: pointer; }

        /* BUSCA E SUGESTÕES */
        .search-container { padding: 15px; position: relative; }
        .search-results { position: absolute; top: 60px; left: 15px; right: 15px; background: white; border-radius: 15px; z-index: 3000; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; }
        .user-row { display: flex; align-items: center; gap: 10px; padding: 12px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }

        /* CARDS E TELAS */
        .aba { display: none; min-height: 100vh; padding-bottom: 100px; }
        .aba.ativa { display: block; animation: slideUp 0.3s ease-out; }
        .card { background: var(--card); margin: 15px; border-radius: 28px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* GRID DE EMOJIS (CORRIGIDO) */
        .exp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 15px 0; }
        .exp-box { background: #F8FAFC; border: 1.5px solid #F1F5F9; border-radius: 18px; padding: 12px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .exp-box span { font-size: 24px; }
        .exp-box input { width: 18px; height: 18px; margin: 0; }

        /* TIMELINE (ESTILO PRINT) */
        .timeline-container { padding: 10px 20px; position: relative; }
        .timeline-line { position: absolute; left: 35px; top: 0; bottom: 0; width: 2px; background: white; z-index: 0; }
        .t-item { display: flex; gap: 15px; margin-bottom: 25px; position: relative; z-index: 1; }
        .t-dot { min-width: 12px; height: 12px; background: var(--primary); border: 3px solid white; border-radius: 50%; margin-top: 25px; }
        .t-card { flex: 1; background: white; border-radius: 28px; overflow: hidden; position: relative; height: 280px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .t-img { width: 100%; height: 100%; object-fit: cover; }
        .t-info { position: absolute; bottom: 0; width: 100%; padding: 15px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); color: white; }

        /* BOTÕES */
        .btn { width: 100%; padding: 16px; border: none; border-radius: 20px; font-weight: 800; font-size: 15px; cursor: pointer; transition: 0.2s; font-family: inherit; display: block; }

/* Cor Vermelha (Principal) */
        .btn-p { background-color: #FF4B5C !important; color: white !important; }

/* Cor Verde (Sucesso/Dinheiro) */
        .btn-m { background-color: #10B981 !important; color: white !important; }

/* Efeito de clique em qualquer botão */
        .btn:active { transform: scale(0.96); opacity: 0.9; }

        /* NAV MENU */
        .nav { position: fixed; bottom: 15px; left: 15px; right: 15px; height: 70px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; }
        .nav-item { font-size: 24px; opacity: 0.3; transition: 0.3s; }
        .nav-item.ativa { opacity: 1; color: var(--primary); transform: translateY(-5px); }

        /* MODAL ALERTA */
        .modal-alert { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 5000; display: none; align-items: center; justify-content: center; }
        
        #login-screen { position: fixed; inset: 0; background: var(--sky); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="modal-alerta" class="modal-alert">
        <div class="card" style="max-width: 320px; text-align: center; width: 85%;">
            <div id="alert-icon" style="font-size: 50px; margin-bottom: 10px;">✨</div>
            <p id="alert-msg" style="font-weight: 800; margin-bottom: 20px;"></p>
            <button class="btn btn-m" onclick="fecharAlerta()">Entendido!</button>
        </div>
    </div>

    <div id="login-screen">
        <div class="card" style="width: 100%; max-width: 360px; text-align: center;">
            <div style="font-size: 60px;">🌍</div>
            <h2>Nossa Jornada</h2>
            <input type="email" id="email" placeholder="Seu E-mail">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn btn-p" onclick="handleAuth()" id="btn-auth-text" style="margin-top:15px;">Entrar no Mapa</button>
            <p style="font-size: 13px; color: var(--sub); margin-top: 15px;" onclick="toggleAuth()">Não tem conta? <b style="color:var(--primary)">Criar Jornada</b></p>
        </div>
    </div>

    <div class="header">
        <div class="header-title">
            <h3 style="margin:0; font-size: 16px;">Nossa Jornada 👫</h3>
            <span id="header-conquistas" style="font-size: 9px; font-weight: 800; color: var(--sub);">ESTADOS: 0</span>
        </div>
        <img id="my-avatar-top" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="header-avatar" onclick="mudarAba('perfil', document.getElementById('nav-perfil'))">
    </div>

    <div id="aba-feed" class="aba ativa">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="🔍 Buscar viajantes..." oninput="buscarUsuarios(this.value)">
            <div id="search-results" class="search-results"></div>
            
            <div style="margin-top: 15px;">
                <small style="font-weight: 800; color: var(--sub); text-transform: uppercase; font-size: 9px;">Sugestões de amizade 📍</small>
                <div id="sugestoes-amigos" style="display: flex; gap: 10px; overflow-x: auto; padding: 10px 0;"></div>
            </div>
        </div>
        <div id="feed-container"></div>
    </div>

    <div id="aba-mapa" class="aba">
        <div class="card" style="height: 400px; overflow: hidden; padding: 0;"><div id="svg-container"></div></div>
        <div id="notificacoes-amizade"></div>
    </div>

    <div id="aba-registro" class="aba">
        <div class="card">
            <h4 style="margin-top:0;">Nova Memória 📍</h4>
            <select id="sel-uf">
                <option value="BRSP">São Paulo</option><option value="BRRJ">Rio de Janeiro</option>
                <option value="BRMG">Minas Gerais</option><option value="BRBA">Bahia</option>
            </select>
            <input type="text" id="cidade" placeholder="Cidade">
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="number" id="v-hosp" placeholder="Hotel">
                <input type="number" id="v-trans" placeholder="Transporte">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="number" id="v-alime" placeholder="Comida">
                <input type="number" id="v-atrac" placeholder="Atrações">
            </div>

            <div class="exp-grid">
                <label class="exp-box"><span>🏨</span><input type="checkbox" id="chk-h"></label>
                <label class="exp-box"><span>🚗</span><input type="checkbox" id="chk-t"></label>
                <label class="exp-box"><span>🏖️</span><input type="checkbox" id="chk-p"></label>
                <label class="exp-box"><span>🍴</span><input type="checkbox" id="chk-a"></label>
                <label class="exp-box"><span>🎡</span><input type="checkbox" id="chk-atr"></label>
                <label class="exp-box"><span>🌲</span><input type="checkbox" id="chk-n"></label>
            </div>

            <button class="btn" style="background:#f1f5f9; font-size:12px;" onclick="document.getElementById('inp-fotos').click()">📸 Fotos (Máx 3)</button>
            <input type="file" id="inp-fotos" multiple accept="image/*" onchange="previaFotos(this)" style="display:none">
            <div id="previa-container" style="display:flex; gap:8px; justify-content:center; margin-top:10px;"></div>

            <label style="font-size: 11px; margin-top: 15px; display: block;"><input type="checkbox" id="is-vip"> Permitir que Favoritos vejam o valor</label>
            <button class="btn btn-m" style="margin-top:15px;" onclick="postarViagem()">Salvar Memória 🚩</button>
        </div>
    </div>

    <div id="aba-ranking" class="aba">
        <div class="card" id="rank-container"></div>
    </div>

    <div id="aba-perfil" class="aba">
        <div class="card" style="text-align: center; position: relative;">
            <button id="btn-edit-toggle" style="position: absolute; right: 20px; top: 20px; border:none; background:none; font-size:20px;">⚙️</button>
            <img id="p-img" src="https://via.placeholder.com/120" style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid var(--primary);">
            
            <div id="perfil-info">
                <h2 id="p-nome" style="margin: 10px 0 0;">Nome</h2>
                <p id="p-user" style="color: var(--sub); margin: 0; font-weight: 600;">@username</p>
                <p id="p-bio" style="font-size: 14px; padding: 10px 15px;">Bio...</p>
                
                <div style="display: flex; justify-content: center; gap: 20px; margin: 15px 0;">
                    <div><b id="count-estados">0</b><br><small>Estados</small></div>
                    <div><b id="count-cidades">0</b><br><small>Cidades</small></div>
                </div>

                <div id="btn-amizade-container"></div>
            </div>

            <div id="perfil-edit" style="display:none; margin-top: 20px;">
                <input type="file" id="f-upload" style="display:none" onchange="uploadFotoPerfil(this)">
                <button onclick="document.getElementById('f-upload').click()" class="btn" style="background:#f1f5f9; font-size:11px; margin-bottom:10px;">Mudar Foto 📸</button>
                <input type="text" id="edit-nome" placeholder="Nome">
                <input type="text" id="edit-bio" placeholder="Bio">
                <button class="btn btn-p" onclick="salvarPerfil()">Salvar Perfil</button>
                <button onclick="auth.signOut()" style="margin-top:20px; color:red; border:none; background:none; font-weight:bold;">Sair da Conta</button>
            </div>
        </div>

        <div class="timeline-container">
            <div class="timeline-line"></div>
            <div id="p-timeline"></div>
        </div>
    </div>

    <div id="aba-gastos" class="aba">
        <div class="card" id="financeiro-detalhado"></div>
    </div>

    <nav class="nav">
        <div class="nav-item ativa" onclick="mudarAba('feed', this)">🏠</div>
        <div class="nav-item" onclick="mudarAba('mapa', this)">📍</div>
        <div class="nav-item" onclick="mudarAba('registro', this)">➕</div>
        <div class="nav-item" onclick="mudarAba('ranking', this)">🏆</div>
        <div class="nav-item" id="nav-perfil" onclick="mudarAba('perfil', this)" style="display:none">👤</div>
        <div class="nav-item" onclick="mudarAba('gastos', this)">💰</div>
    </nav>

    <script>
        <script>
    const firebaseConfig = {
        apiKey: "AIzaSyC6C5dJZeRF6Ylx4x-eWex6s2WGdRiMqbg",
        authDomain: "pjrsddinst-00.firebaseapp.com",
        projectId: "pjrsddinst-00",
        storageBucket: "pjrsddinst-00.firebasestorage.app",
        messagingSenderId: "500429246053",
        appId: "1:500429246053:web:0af4090351346a0513808c",
        databaseURL: "https://pjrsddinst-00-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let me = null;
    let isLogin = true;
    let fotosBase64 = [];
    let perfilLogado = {};
    let controleMapa;

    // --- ALERTAS E UTILIDADES ---
    function customAlerta(msg, icon = '✨') {
        document.getElementById('alert-msg').innerText = msg;
        document.getElementById('alert-icon').innerText = icon;
        document.getElementById('modal-alerta').style.display = 'flex';
    }
    function fecharAlerta() { document.getElementById('modal-alerta').style.display = 'none'; }
    function toggleAuth() {
    isLogin = !isLogin;
    const btn = document.getElementById('btn-auth-text');
    const title = document.querySelector('#login-screen h2');
    const link = document.querySelector('#login-screen p');

    if (isLogin) {
        title.innerText = "Nossa Jornada";
        btn.innerText = "Entrar no Mapa";
        link.innerHTML = 'Não tem conta? <b style="color:var(--primary)">Criar Jornada</b>';
    } else {
        title.innerText = "Nova Jornada 🚀";
        btn.innerText = "Criar Minha Conta";
        link.innerHTML = 'Já tem conta? <b style="color:var(--primary)">Fazer Login</b>';
    }
}

    // --- AUTENTICAÇÃO ---
    async function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        try {
            if(isLogin) await auth.signInWithEmailAndPassword(email, pass);
            else {
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                await db.ref('usuarios/' + res.user.uid + '/perfil').set({
                    nome: "Viajante", username: "user" + Math.floor(Math.random()*999), estados: 0, cidadesCount: 0
                });
            }
        } catch(e) { customAlerta(e.message, '❌'); }
    }

    auth.onAuthStateChanged(user => {
        if(user) { me = user; document.getElementById('login-screen').style.display = 'none'; initApp(); }
        else { document.getElementById('login-screen').style.display = 'flex'; }
    });

    // --- SISTEMA SOCIAL (AMIGOS E BUSCA) ---
    async function buscarUsuarios(val) {
        if(val.length < 3) { document.getElementById('search-results').style.display = 'none'; return; }
        const snap = await db.ref('usuarios').once('value');
        const users = snap.val();
        let html = '';
        for(let uid in users) {
            const p = users[uid].perfil;
            if(p.username.includes(val.toLowerCase()) && uid !== me.uid) {
                html += `<div class="user-row" onclick="verPerfilOutro('${uid}')">
                    <img src="${p.foto || 'https://via.placeholder.com/30'}" style="width:30px;height:30px;border-radius:50%">
                    <b>@${p.username}</b>
                </div>`;
            }
        }
        document.getElementById('search-results').innerHTML = html;
        document.getElementById('search-results').style.display = html ? 'block' : 'none';
    }

    async function enviarSolicitacao(destUid) {
        await db.ref(`solicitacoes/${destUid}/${me.uid}`).set({
            nome: perfilLogado.nome, foto: perfilLogado.foto || '', status: 'pendente'
        });
        customAlerta("Solicitação enviada! ✈️");
        verPerfilOutro(destUid);
    }

    async function aceitarAmigo(origemUid) {
        const up = {};
        up[`amigos/${me.uid}/${origemUid}`] = true;
        up[`amigos/${origemUid}/${me.uid}`] = true;
        up[`solicitacoes/${me.uid}/${origemUid}`] = null;
        await db.ref().update(up);
        customAlerta("Nova amizade aceita! 🤝");
        initApp();
    }

    // --- FINANCEIRO PRIVADO ---
    async function renderFinanceiro() {
        const snap = await db.ref(`usuarios/${me.uid}/viagens`).once('value');
        const viagens = snap.val() || {};
        let html = '<h3>Meu Cofre de Viagens 💰</h3>', totalBrasil = 0;
        
        for(let uf in viagens) {
            let totalUF = 0;
            for(let id in viagens[uf]) totalUF += parseFloat(viagens[uf][id].valor) || 0;
            totalBrasil += totalUF;
            html += `<div class="card" style="margin:8px 0; display:flex; justify-content:space-between;">
                <b>${uf.replace('BR','')}</b> <span>R$ ${totalUF.toLocaleString('pt-BR')}</span>
            </div>`;
        }
        document.getElementById('financeiro-detalhado').innerHTML = html + `
            <div class="card" style="background:var(--money); color:white; text-align:center;">
                <small>TOTAL BRASIL</small><h2>R$ ${totalBrasil.toLocaleString('pt-BR')}</h2>
            </div>`;
    }

    // --- RANKING (DESEMPATE POR CIDADES) ---
    async function renderRanking() {
        const snap = await db.ref('usuarios').once('value');
        const users = Object.entries(snap.val() || {}).map(([id, data]) => ({ id, ...data.perfil }));
        
        // Ordena por estados, se empatar, ordena por cidades
        users.sort((a,b) => (b.estados || 0) - (a.estados || 0) || (b.cidadesCount || 0) - (a.cidadesCount || 0));
        
        let html = '<h3>Ranking de Conquistadores 🏆</h3>';
        users.forEach((u, i) => {
            html += `<div class="user-row" onclick="verPerfilOutro('${u.id}')">
                <b style="width:20px">${i+1}</b>
                <img src="${u.foto || 'https://via.placeholder.com/30'}" style="width:30px;height:30px;border-radius:50%">
                <div style="flex:1"><b>@${u.username}</b><br><small>${u.estados || 0} Est. | ${u.cidadesCount || 0} Cid.</small></div>
            </div>`;
        });
        document.getElementById('rank-container').innerHTML = html;
    }

    // --- LOGICA DE POSTAGEM ---
    async function postarViagem() {
        const uf = document.getElementById('sel-uf').value;
        const cidade = document.getElementById('cidade').value;
        const tripID = Date.now();
        
        const trip = {
            id: tripID, uid: me.uid, username: perfilLogado.username, fotoUser: perfilLogado.foto || '',
            uf, cidade, fotos: fotosBase64, valor: document.getElementById('valor')?.value || 0,
            exp: { h: document.getElementById('chk-h').checked, t: document.getElementById('chk-t').checked, 
                   p: document.getElementById('chk-p').checked, a: document.getElementById('chk-a').checked,
                   atr: document.getElementById('chk-atr').checked, n: document.getElementById('chk-n').checked },
            isVip: document.getElementById('is-vip').checked, data: new Date().toLocaleDateString()
        };

        // Salva Global e Privado
        await db.ref(`feed_global/${tripID}`).set(trip);
        await db.ref(`usuarios/${me.uid}/viagens/${uf}/${tripID}`).set(trip);

        // Atualiza contadores de desempate
        const viagensSnap = await db.ref(`usuarios/${me.uid}/viagens`).once('value');
        const vData = viagensSnap.val() || {};
        const estCount = Object.keys(vData).length;
        
        let cidadesUnicas = new Set();
        for(let u in vData) for(let id in vData[u]) cidadesUnicas.add(vData[u][id].cidade.toLowerCase());
        
        await db.ref(`usuarios/${me.uid}/perfil`).update({ estados: estCount, cidadesCount: cidadesUnicas.size });
        
        customAlerta("Viagem Registrada! 🚀");
        mudarAba('feed', document.querySelector('.nav-item'));
    }

    // --- CARREGAMENTO DE FOTOS ---
    async function esmagarFoto(file) {
        return new Promise(r => {
            const rd = new FileReader(); rd.readAsDataURL(file);
            rd.onload = e => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const cv = document.createElement('canvas'); const ctx = cv.getContext('2d');
                    cv.width = 600; cv.height = 600 * (img.height/img.width);
                    ctx.drawImage(img, 0, 0, cv.width, cv.height);
                    r(cv.toDataURL('image/jpeg', 0.6));
                }
            }
        });
    }

    async function previaFotos(input) {
        fotosBase64 = [];
        const container = document.getElementById('previa-container');
        container.innerHTML = "";
        for(let f of Array.from(input.files).slice(0, 3)) {
            const b64 = await esmagarFoto(f);
            fotosBase64.push(b64);
            container.innerHTML += `<img src="${b64}" style="width:45px;height:45px;border-radius:10px;object-fit:cover;">`;
        }
    }

    // --- INICIALIZAÇÃO DO APP ---
    async function initApp() {
        // Carrega Perfil Logado
        db.ref(`usuarios/${me.uid}/perfil`).on('value', snap => {
            perfilLogado = snap.val() || {};
            document.getElementById('my-avatar-top').src = perfilLogado.foto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            document.getElementById('header-conquistas').innerText = `ESTADOS: ${perfilLogado.estados || 0}`;
        });

        // Carrega Notificações (Convites)
        db.ref(`solicitacoes/${me.uid}`).on('value', snap => {
            const sols = snap.val();
            let html = '';
            for(let id in sols) {
                html += `<div class="card" style="margin:10px; padding:10px; font-size:12px; display:flex; justify-content:space-between; align-items:center;">
                    <span><b>${sols[id].nome}</b> quer ser seu amigo</span>
                    <button class="btn btn-m" style="width:auto; padding:5px 15px;" onclick="aceitarAmigo('${id}')">Aceitar</button>
                </div>`;
            }
            document.getElementById('notificacoes-amizade').innerHTML = html;
        });

        // Mapa SVG
        const res = await fetch('https://raw.githubusercontent.com/talisonc00/l/main/br.svg');
        document.getElementById('svg-container').innerHTML = await res.text();
        const svg = document.querySelector('#svg-container svg');
        svg.style.width = "100%"; svg.style.height = "100%";
        controleMapa = svgPanZoom(svg, { zoomEnabled: true, controlIconsEnabled: false, fit: true, center: true });

        // Pintar Mapa
        db.ref(`usuarios/${me.uid}/viagens`).on('value', snap => {
            const v = snap.val() || {};
            document.querySelectorAll('path').forEach(p => {
                p.classList.remove('visitado');
                if(v[p.id]) p.classList.add('visitado');
            });
        });

        renderFeed();
    }

    function mudarAba(id, el) {
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('ativa'));
        document.getElementById('aba-' + id).classList.add('ativa');
        if(el) el.classList.add('ativa');
        if(id === 'perfil') verPerfilOutro(me.uid);
        if(id === 'ranking') renderRanking();
        if(id === 'gastos') renderFinanceiro();
        if(id === 'feed') renderFeed();
    }

    async function verPerfilOutro(uid) {
        const snap = await db.ref(`usuarios/${uid}`).once('value');
        const u = snap.val();
        const p = u.perfil;
        
        // Verifica amizade
        const saoAmigos = uid === me.uid || (await db.ref(`amigos/${me.uid}/${uid}`).once('value')).exists();
        
        document.getElementById('p-img').src = p.foto || 'https://via.placeholder.com/120';
        document.getElementById('p-nome').innerText = p.nome;
        document.getElementById('p-user').innerText = '@' + p.username;
        document.getElementById('p-bio').innerText = p.bio || 'Sem biografia.';
        document.getElementById('count-estados').innerText = p.estados || 0;
        document.getElementById('count-cidades').innerText = p.cidadesCount || 0;
        document.getElementById('btn-edit-toggle').style.display = uid === me.uid ? 'block' : 'none';

        // Botão de Amizade
        let btnHtml = '';
        if(uid !== me.uid && !saoAmigos) {
            btnHtml = `<button class="btn btn-p" onclick="enviarSolicitacao('${uid}')">Solicitar Amizade ✈️</button>`;
        }
        document.getElementById('btn-amizade-container').innerHTML = btnHtml;

        // Timeline (Só se for amigo ou eu mesmo)
        let tlHtml = '';
        if(saoAmigos) {
            const viagens = u.viagens || {};
            let todas = [];
            for(let uf in viagens) for(let id in viagens[uf]) todas.push(viagens[uf][id]);
            todas.sort((a,b) => b.id - a.id);
            
            todas.forEach(v => {
                tlHtml += `<div class="t-item">
                    <div class="t-dot"></div>
                    <div class="t-card">
                        <img src="${v.fotos?.[0] || ''}" class="t-img">
                        <div class="t-info">
                            <b>${v.cidade} - ${v.uf.replace('BR','')}</b><br>
                            <small>${v.data}</small>
                            <span style="float:right; color:#4ade80; font-weight:800">R$ ${v.valor}</span>
                        </div>
                    </div>
                </div>`;
            });
        } else {
            tlHtml = '<p style="text-align:center; opacity:0.5; padding:20px;">🔒 Perfil Privado. Siga para ver as viagens.</p>';
        }
        document.getElementById('p-timeline').innerHTML = tlHtml;
        mudarAba('perfil', document.getElementById('nav-perfil'));
    }

    async function renderFeed() {
        const snap = await db.ref('feed_global').limitToLast(20).once('value');
        const feed = snap.val() || {};
        const amigosSnap = await db.ref(`amigos/${me.uid}`).once('value');
        const meusAmigos = Object.keys(amigosSnap.val() || {});
        
        let html = '<h3 style="margin-left:15px">Feed Global 🌍</h3>';
        Object.values(feed).reverse().forEach(p => {
            // Regra de Privacidade
            const souDono = p.uid === me.uid;
            const souAmigo = meusAmigos.includes(p.uid);
            
            if(p.uid === me.uid || souAmigo) {
                html += `<div class="feed-card">
                    <div style="padding:15px; display:flex; align-items:center; gap:10px" onclick="verPerfilOutro('${p.uid}')">
                        <img src="${p.fotoUser || 'https://via.placeholder.com/30'}" style="width:35px;height:35px;border-radius:50%">
                        <b>@${p.username}</b>
                    </div>
                    <div style="height:300px; background:#eee"><img src="${p.fotos?.[0]}" style="width:100%; height:100%; object-fit:cover;"></div>
                    <div style="padding:15px;">
                        <b>${p.cidade} - ${p.uf.replace('BR','')}</b><br>
                        <div style="margin-top:8px; display:flex; gap:10px;">
                            ${p.exp.h?'🏨':''} ${p.exp.t?'🚗':''} ${p.exp.p?'🏖️':''}
                            <span style="margin-left:auto; color:var(--money); font-weight:800">
                                ${souDono ? 'R$ '+p.valor : '💰 Oculto'}
                            </span>
                        </div>
                    </div>
                </div>`;
            }
        });
        document.getElementById('feed-container').innerHTML = html;
    }
</script>
</body>
</html>
