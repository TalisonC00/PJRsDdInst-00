<!DOCTYPE html> 
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jornada Social 🌍</title>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root {
            --primary: #FF4B5C;
            --sky: #BAE6FD;
            --card: #FFFFFF;
            --text-main: #1E293B;
            --text-sub: #64748B;
            --money: #10B981;
            --glass: rgba(255, 255, 255, 0.9);
            --shadow: 0 10px 30px rgba(0,0,0,0.06);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--sky); margin: 0; color: var(--text-main); overflow-x: hidden; }

        /* HEADER */
        .header { background: #fff; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.03); position: sticky; top: 0; z-index: 2000; }
        .header h3 { margin: 0; font-size: 18px; color: var(--primary); font-weight: 800; }
        .header-avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); cursor: pointer; }

        /* ABAS */
        .aba { display: none; min-height: calc(100vh - 135px); padding-bottom: 90px; }
        .ativa { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card); padding: 20px; margin: 16px; border-radius: 28px; box-shadow: var(--shadow); }

        /* INPUTS */
        input, select, textarea { width: 100%; padding: 15px; border-radius: 16px; border: 1.5px solid #F1F5F9; font-family: inherit; background: #F8FAFC; margin-bottom: 12px; outline: none; }
        label { font-size: 11px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; margin-bottom: 5px; display: block; }
        
        .btn-acao { background: var(--primary); color: #fff; border: none; padding: 16px; border-radius: 20px; width: 100%; font-weight: 800; cursor: pointer; }
        .btn-money { background: var(--money); }

        /* FEED */
        .feed-card { background: #fff; margin: 16px; border-radius: 32px; overflow: hidden; box-shadow: var(--shadow); position: relative; }
        .carrossel { display: flex; overflow-x: auto; snap-type: x mandatory; height: 320px; background: #f8fafc; scrollbar-width: none; }
        .carrossel::-webkit-scrollbar { display: none; }
        .carrossel img { flex: 0 0 100%; height: 100%; object-fit: cover; snap-align: center; }
        
        .tag-gasto { background: #F1F5F9; padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; color: var(--text-main); display: inline-block; border: 1px solid #E2E8F0; }

        .reacoes-menu { display: none; position: absolute; bottom: 60px; left: 15px; background: white; padding: 8px 12px; border-radius: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); gap: 12px; z-index: 100; }
        .reacoes-menu span { font-size: 24px; cursor: pointer; transition: 0.2s; }
        .reacoes-menu span:hover { transform: scale(1.3); }

        /* MAPA */
        #svg-container { width: 100%; height: 100%; background: #fff; }
        path { fill: #F1F5F9; stroke: #fff; stroke-width: 0.8; transition: 0.5s; cursor: pointer; }

        /* NAV */
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--glass); display: flex; height: 75px; border-top-left-radius: 35px; border-top-right-radius: 35px; z-index: 1000; backdrop-filter: blur(15px); align-items: center; justify-content: space-around; }
        .nav-item { font-size: 26px; opacity: 0.3; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--primary); transform: translateY(-5px); }

        /* CONQUISTAS */
        .badge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .badge { display: flex; flex-direction: column; align-items: center; opacity: 0.2; filter: grayscale(1); transition: 0.5s; text-align: center; }
        .badge.active { opacity: 1; filter: grayscale(0); }
        .b-icon { width: 60px; height: 60px; background: #F1F5F9; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; margin-bottom: 8px; }
        @keyframes bounce { 0%, 100% { transform: translateY(0);} 50% { transform: translateY(-10px);}}

        /* AUTH & MODAL */
        #auth-screen { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); padding: 20px; }
        .modal-card { background: #fff; padding: 25px; border-radius: 35px; width: 100%; max-width: 380px; position: relative; max-height: 85vh; overflow-y: auto; text-align: center;}
        
        #res-busca { background: #fff; border-radius: 18px; margin-top: 5px; max-height: 200px; overflow-y: auto; border: 1px solid #F1F5F9; display: none; }
        .sugestao-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-bottom: 1px solid #F8FAFC; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="card" style="width: 100%; max-width: 360px; text-align: center;">
            <div style="font-size: 50px;">🌍</div>
            <h2 id="auth-title">Minha Jornada</h2>
            <input type="email" id="auth-email" placeholder="E-mail">
            <input type="password" id="auth-pass" placeholder="Senha">
            <button class="btn-acao" onclick="handleAuth()" id="btn-auth-main">Entrar</button>
            <p style="margin-top: 20px; font-size: 13px;">
                <span id="auth-text-toggle">Ainda não tem conta?</span> 
                <b id="auth-btn-toggle" style="color:var(--primary); cursor: pointer;" onclick="toggleAuthMode()">Cadastrar</b>
            </p>
        </div>
    </div>

    <div class="header">
        <div>
            <h3 id="view-title">Explorar</h3>
            <span style="font-size: 10px; font-weight: 800; color: var(--text-sub);">CONECTADO</span>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;" onclick="irParaPerfilProprio()">
            <div style="text-align: right;">
                <div id="h-nome" style="font-size: 12px; font-weight: 800;">...</div>
                <div id="h-user" style="font-size: 10px; color: var(--text-sub);">@...</div>
            </div>
            <img id="h-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="header-avatar">
        </div>
    </div>

    <div id="aba-feed" class="aba ativa">
        <div class="card" style="padding: 12px; margin-bottom: 5px;">
            <input type="text" id="input-busca" placeholder="Buscar viajantes..." oninput="buscarDinamico(this.value)">
            <div id="res-busca"></div>
        </div>
        <div id="lista-feed"></div>
    </div>

    <div id="aba-mapa" class="aba">
        <div class="mapa-frame" style="height: 75vh; position: relative;">
            <div id="map-owner-tag" style="position: absolute; top: 15px; left: 15px; z-index: 10; background:var(--primary); color:white; padding:5px 12px; border-radius:12px; font-size:11px; font-weight:800;">Meu Mapa</div>
            <div id="svg-container"></div>
        </div>
    </div>

    <div id="aba-registro" class="aba">
        <div class="card">
            <h3>Nova Memória 🚩</h3>
            <label>Estado</label>
            <select id="reg-uf">
                <option value="BRSP">São Paulo</option><option value="BRRJ">Rio de Janeiro</option><option value="BRMG">Minas Gerais</option>
                <option value="BRBA">Bahia</option><option value="BRSC">Santa Catarina</option><option value="BRPR">Paraná</option>
                <option value="BRRS">Rio Grande do Sul</option><option value="BRGO">Goiás</option><option value="BRDF">Distrito Federal</option>
            </select>
            <input type="text" id="reg-cidade" placeholder="Cidade">
            <input type="date" id="reg-data">
            
            <label>Investimento</label>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="number" id="reg-h" placeholder="🏨 Hotel">
                <input type="number" id="reg-t" placeholder="🚗 Transp.">
                <input type="number" id="reg-al" placeholder="🍴 Comida">
                <input type="number" id="reg-at" placeholder="🎡 Lazer">
            </div>

            <div style="margin: 10px 0; padding: 12px; background: #FFF5F5; border-radius: 16px; border: 1px solid #FFE4E6;">
                <label style="display: flex; align-items: center; gap: 10px; font-size:11px; cursor:pointer; color: var(--primary); text-transform: none;">
                    <input type="checkbox" id="reg-publico-gastos" style="width:20px;height:20px;margin:0"> 
                    <span><b>Liberar gastos para todos?</b> 🌍</span>
                </label>
            </div>

            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <label style="font-size:12px;"><input type="checkbox" id="reg-p"> Praia 🏖️</label>
                <label style="font-size:12px;"><input type="checkbox" id="reg-n"> Natureza 🌳</label>
            </div>

            <input type="file" id="reg-fotos" multiple accept="image/*" onchange="processarFotosPost(this)">
            <div id="previa-post" style="display:flex; gap:5px; overflow-x:auto;"></div>
            <button class="btn-acao btn-money" onclick="publicarViagem()">Salvar e Publicar</button>
        </div>
    </div>

    <div id="aba-gastos" class="aba">
        <div class="card">
            <h3>💰 Gestão Financeira</h3>
            <div id="lista-gastos-uf"></div>
            <div style="background: var(--money); color: #fff; padding: 25px; border-radius: 25px; text-align: center; margin-top: 25px;">
                <small>TOTAL ACUMULADO</small>
                <h2 id="valor-total-brasil">R$ 0,00</h2>
            </div>
        </div>
    </div>

    <div id="aba-perfil" class="aba">
        <div class="card" style="text-align: center; position: relative;">
            <div onclick="abrirConfiguracoes()" style="position: absolute; right: 0; top: 0; font-size: 24px;">⚙️</div>
            <img id="perfil-foto" src="" style="width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary);">
            <h2 id="perfil-nome">...</h2>
            <p id="perfil-user" style="color:var(--primary); font-weight:800;">@username</p>
            <p id="perfil-bio" style="font-size:13px; color:var(--text-sub);"></p>
            
            <div id="perfil-social-actions" style="display:none; justify-content:center; gap:10px; margin:15px 0;">
                <button id="btn-amizade" class="btn-acao" style="width:auto; padding:8px 20px;">Conectar</button>
            </div>

            <div style="display:flex; justify-content:center; gap:25px; border-top:1px solid #eee; padding-top:15px;">
                <div><b>Amigos</b><br><span id="count-amigos">0</span></div>
                <div><b>Conquistas</b><br><span id="count-conquistas">0</span></div>
            </div>

            <div id="convites-pendentes"></div>
            <h4 style="text-align:left;">🏆 Conquistas</h4>
            <div id="lista-conquistas" class="badge-grid"></div>
            <h4 style="text-align:left; margin-top:20px;">🕒 Linha do Tempo</h4>
            <div id="perfil-timeline"></div>
        </div>
    </div>

    <div id="modal-global" class="modal">
        <div class="modal-card">
            <div id="modal-icon" style="font-size: 40px;">💡</div>
            <div id="modal-content"></div>
            <button class="btn-acao" onclick="fecharModal()" style="margin-top:15px;">OK</button>
        </div>
    </div>

    <div id="modal-config" class="modal">
        <div class="modal-card">
            <h3>Configurações</h3>
            <label>Nome</label>
            <input type="text" id="edit-nome">
            <label>Username</label>
            <input type="text" id="edit-user">
            <label>Bio</label>
            <textarea id="edit-bio"></textarea>
            <label>Privacidade</label>
            <select id="edit-tipo">
                <option value="brasil">Viajante Brasil (Público)</option>
                <option value="local">Viajante Local (Privado)</option>
            </select>
            <button class="btn-acao" onclick="salvarConfig()">Salvar</button>
            <button onclick="logout()" style="margin-top:20px; background:none; border:none; color:var(--primary); font-weight:800;">SAIR DA CONTA</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="trocarAba('feed', this)">🏠</div>
        <div class="nav-item" onclick="trocarAba('mapa', this)">📍</div>
        <div class="nav-item" onclick="trocarAba('registro', this)">➕</div>
        <div class="nav-item" onclick="trocarAba('gastos', this)">💰</div>
        <div class="nav-item" onclick="trocarAba('perfil', this)">👤</div>
    </nav>

<script>
// CONFIGURAÇÃO FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyC6C5dJZeRF6Ylx4x-eWex6s2WGdRiMqbg",
    authDomain: "pjrsddinst-00.firebaseapp.com",
    projectId: "pjrsddinst-00",
    storageBucket: "pjrsddinst-00.firebasestorage.app",
    messagingSenderId: "500429246053",
    appId: "1:500429246053:web:0af4090351346a0513808c",
    databaseURL: "https://pjrsddinst-00-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let eu = null, meuPerfil = {}, targetUid = null, isLoginMode = true, fotosPost = [];

const REGIOES = {
    'NORTE': { icon: '🌳', UFs: ['BRAC','BRAM','BRRR','BRRO','BRPA','BRAP','BRTO'] },
    'NORDESTE': { icon: '🌵', UFs: ['BRMA','BRPI','BRCE','BRRN','BRPB','BRPE','BRAL','BRSE','BRBA'] },
    'CENTRO': { icon: '☀️', UFs: ['BRMT','BRMS','BRGO','BRDF'] },
    'SUDESTE': { icon: '🏢', UFs: ['BRMG','BRSP','BRRJ','BRES'] },
    'SUL': { icon: '❄️', UFs: ['BRPR','BRSC','BRRS'] }
};

// --- AUTENTICAÇÃO ---
function toggleAuthMode() {
    isLoginMode = !isLoginMode;
    document.getElementById('auth-title').innerText = isLoginMode ? "Minha Jornada" : "Nova Jornada";
    document.getElementById('btn-auth-main').innerText = isLoginMode ? "Entrar" : "Cadastrar";
}

async function handleAuth() {
    const email = document.getElementById('auth-email').value;
    const pass = document.getElementById('auth-pass').value;
    if(!email || pass.length < 6) return alert("Preencha corretamente.");

    try {
        if(isLoginMode) {
            await auth.signInWithEmailAndPassword(email, pass);
        } else {
            const res = await auth.createUserWithEmailAndPassword(email, pass);
            const uid = res.user.uid;
            const user = "viajante_" + Math.floor(Math.random()*9999);
            await db.ref(`usuarios/${uid}/perfil`).set({
                nome: "Novo Viajante", username: user, tipoPerfil: "local", bio: "Explorando!", foto: "https://cdn-icons-png.flaticon.com/512/149/149071.png"
            });
            await db.ref(`usernames/${user}`).set(uid);
        }
    } catch(e) { alert(e.message); }
}

auth.onAuthStateChanged(user => {
    if(user) { eu = user; document.getElementById('auth-screen').style.display='none'; initApp(); }
    else { document.getElementById('auth-screen').style.display='flex'; }
});

function logout() { auth.signOut().then(() => { localStorage.clear(); window.location.reload(); }); }

// --- CORE APP ---
async function initApp() {
    db.ref(`usuarios/${eu.uid}/perfil`).on('value', snap => {
        meuPerfil = snap.val() || {};
        document.getElementById('h-nome').innerText = meuPerfil.nome;
        document.getElementById('h-user').innerText = "@" + meuPerfil.username;
        document.getElementById('h-avatar').src = meuPerfil.foto;
        if(!targetUid) carregarPerfilUI(eu.uid);
    });

    // 2. Carregamento do Mapa com Promessa
    try {
        const res = await fetch('br.svg');
        if (!res.ok) throw new Error("Erro ao buscar br.svg");
        const svgText = await res.text();
        const container = document.getElementById('svg-container');
        
        container.innerHTML = svgText;

        // Localiza o SVG recém injetado
        const svgEl = container.querySelector('svg');
        if (svgEl) {
            svgEl.setAttribute('id', 'mapa-svg-real');
            svgEl.style.width = "100%";
            svgEl.style.height = "100%";
    
    setTimeout(() => {
        const svgEl = document.querySelector('#svg-container svg');
        svgEl.id = "mapa-svg-real";
        svgPanZoom(svgEl, { zoomEnabled: true, controlIconsEnabled: false, fit: true, center: true });
        pintarMapa(targetUid || eu.uid);
    }, 500);

    // Decide qual mapa pintar: o seu ou o do amigo visitado
                const donoDoMapa = targetUid || eu.uid;
                pintarMapa(donoDoMapa);
                
                console.log("Mapa carregado e pintado para:", donoDoMapa);
            }, 500);
        }
    } catch (e) {
        console.error("Falha Crítica no Mapa:", e);
    }

    document.getElementById('svg-container').onclick = e => {
        const el = e.target.closest('path');
        if(el && el.id) abrirPopEstado(el.id, targetUid || eu.uid);
    };

    renderFeed();
    ouvirConvites();
    verificarConquistas();
}

    function pintarMapa(uid) {
    if (!uid) return;

    db.ref(`usuarios/${uid}/viagens`).once('value', snap => {
        const viagens = snap.val() || {};
        
        // Seleciona todos os caminhos do mapa
        const paths = document.querySelectorAll('#svg-container path');
        
        // 1. Limpa todas as cores (Reseta o mapa)
        paths.forEach(p => p.classList.remove('visitado'));

        // 2. Pinta apenas os estados que estão no banco de dados do UID fornecido
        Object.values(viagens).forEach(v => {
            const el = document.getElementById(v.uf); // v.uf deve ser "BRSP", "BRRJ", etc.
            if (el) {
                el.classList.add('visitado');
            }
        });
        
        // Atualiza a tag visual de quem é o mapa
        const tag = document.getElementById('map-owner-tag');
        if(tag) tag.innerText = (uid === eu.uid) ? "Meu Mapa" : "Mapa de Amigo";
    });
}

    function renderFeed() {
    db.ref('feed_global').limitToLast(30).on('value', async snap => {
        const container = document.getElementById('lista-feed');
        container.innerHTML = "";
        const posts = Object.values(snap.val() || {}).reverse();
        const amigosSnap = await db.ref(`usuarios/${eu.uid}/amigos`).once('value');
        const amigos = Object.keys(amigosSnap.val() || {});

        for(let p of posts) {
            const dono = (await db.ref(`usuarios/${p.uid}/perfil`).once('value')).val() || {};
            if(p.uid === eu.uid || amigos.includes(p.uid) || dono.tipoPerfil === 'brasil') {
                renderizarCard(p, container);
            }
        }
    });
}

async function renderizarCard(p, container) {
    const isVIP = (await db.ref(`usuarios/${p.uid}/vips/${eu.uid}`).once('value')).exists();
    const podeVer = (p.uid === eu.uid) || isVIP || p.abertoParaTodos;

    let gastos = podeVer ? `
        <span class="tag-gasto">🏨 ${p.h}</span>
        <span class="tag-gasto">🚗 ${p.t}</span>
        <span class="tag-gasto">🍴 ${p.al}</span>
    ` : `<span style="font-size:10px; color:#999; margin-left:10px;">🔒 PRIVADO</span>`;

    container.innerHTML += `
        <div class="feed-card">
            <div style="padding:15px; display:flex; justify-content:space-between;">
                <b onclick="irParaPerfil('${p.uid}')">@${p.user}</b>
                <small>${p.cidade}</small>
            </div>
            <div class="carrossel">${p.fotos ? p.fotos.map(f => `<img src="${f}">`).join('') : ''}</div>
            <div style="padding:12px 15px; display:flex; align-items:center; border-top:1px solid #eee; overflow-x:auto;">
                <button onclick="abrirMenuReacao('${p.id}')" style="border:none; background:none; font-size:22px;">
                    <span id="btn-emoji-${p.id}">🤍</span> <span id="btn-count-${p.id}" style="font-size:14px">0</span>
                </button>
                <div style="display:flex; gap:5px; margin-left:10px;">${gastos}</div>
            </div>
            <div class="reacoes-menu" id="menu-${p.id}">
                <span onclick="reagir('${p.id}', '❤️')">❤️</span><span onclick="reagir('${p.id}', '🔥')">🔥</span>
                <span onclick="reagir('${p.id}', '💙')">💙</span><span onclick="reagir('${p.id}', '✈️')">✈️</span>
            </div>
        </div>`;
    vincularLikes(p.id);
}

// --- FUNÇÕES DE APOIO ---
function vincularLikes(id) {
    db.ref(`likes/${id}`).on('value', s => {
        const r = s.val() || {};
        document.getElementById(`btn-emoji-${id}`).innerText = r[eu.uid] || '🤍';
        document.getElementById(`btn-count-${id}`).innerText = Object.keys(r).length;
    });
}

async function reagir(id, emoji) {
    const ref = db.ref(`likes/${id}/${eu.uid}`);
    const atual = (await ref.once('value')).val();
    if(atual === emoji) await ref.remove(); else await ref.set(emoji);
    document.getElementById(`menu-${id}`).style.display = 'none';
}

function abrirMenuReacao(id) {
    const m = document.getElementById(`menu-${id}`);
    m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
}

async function publicarViagem() {
    const cid = document.getElementById('reg-cidade').value;
    const uf = document.getElementById('reg-uf').value;
    const data = document.getElementById('reg-data').value;
    if(!cid || !data) return alert("Preencha tudo.");

    const id = Date.now();
    const post = {
        id, uid: eu.uid, user: meuPerfil.username, cidade: cid, uf, data,
        h: document.getElementById('reg-h').value || 0,
        t: document.getElementById('reg-t').value || 0,
        al: document.getElementById('reg-al').value || 0,
        at: document.getElementById('reg-at').value || 0,
        abertoParaTodos: document.getElementById('reg-publico-gastos').checked,
        fotos: fotosPost
    };
    post.total = Number(post.h) + Number(post.t) + Number(post.al);

    await db.ref(`usuarios/${eu.uid}/viagens/${id}`).set(post);
    await db.ref(`feed_global/${id}`).set(post);
    trocarAba('feed', document.querySelector('.nav-item'));
}

async function processarFotosPost(input) {
    fotosPost = [];
    for(let f of Array.from(input.files).slice(0,3)) {
        const reader = new FileReader();
        reader.readAsDataURL(f);
        reader.onload = e => { fotosPost.push(e.target.result); };
    }
}

function carregarPerfilUI(uid) {
    db.ref(`usuarios/${uid}/perfil`).on('value', snap => {
        const p = snap.val() || {};
        document.getElementById('perfil-nome').innerText = p.nome;
        document.getElementById('perfil-user').innerText = "@" + p.username;
        document.getElementById('perfil-foto').src = p.foto;
        document.getElementById('perfil-bio').innerText = p.bio;
    });
    
    db.ref(`usuarios/${uid}/amigos`).on('value', s => {
        document.getElementById('count-amigos').innerText = Object.keys(s.val() || {}).length;
    });

    renderTimeline(uid);
    renderConquistasUI(uid);
}

async function renderTimeline(uid) {
    const isMe = uid === eu.uid;
    const dono = (await db.ref(`usuarios/${uid}/perfil`).once('value')).val() || {};
    const amigos = (await db.ref(`usuarios/${uid}/amigos/${eu.uid}`).once('value')).exists();

    const container = document.getElementById('perfil-timeline');
    if(!isMe && dono.tipoPerfil === 'local' && !amigos) {
        container.innerHTML = "🔒 Perfil Privado"; return;
    }

    db.ref(`usuarios/${uid}/viagens`).on('value', s => {
        const t = Object.values(s.val() || {}).reverse();
        container.innerHTML = t.map(v => `
            <div style="border-left:2px solid red; padding-left:10px; margin-bottom:10px;">
                <b>${v.cidade}</b> - ${v.data}
            </div>
        `).join('');
    });
}

function renderConquistasUI(uid) {
    db.ref(`usuarios/${uid}/viagens`).once('value', s => {
        const v = Object.values(s.val() || {});
        const ufs = new Set(v.map(i => i.uf));
        const container = document.getElementById('lista-conquistas');
        container.innerHTML = "";
        
        for(let r in REGIOES) {
            const total = REGIOES[r].UFs.length;
            const visitados = REGIOES[r].UFs.filter(u => ufs.has(u)).length;
            const ativa = visitados === total;
            container.innerHTML += `
                <div class="badge ${ativa?'active':''}">
                    <div class="b-icon">${REGIOES[r].icon}</div>
                    <small>${r}</small>
                </div>`;
        }
    });
}

function trocarAba(id, btn) {
    document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('aba-'+id).classList.add('ativa');
    btn.classList.add('active');
    if(id === 'perfil') carregarPerfilUI(targetUid || eu.uid);
}

function irParaPerfil(uid) { targetUid = uid; trocarAba('perfil', document.querySelectorAll('.nav-item')[4]); }
function irParaPerfilProprio() { targetUid = null; trocarAba('perfil', document.querySelectorAll('.nav-item')[4]); }
function fecharModal() { document.getElementById('modal-global').style.display='none'; }
function toast(m) { alert(m); }

</script>
</body>
</html>
