<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jornada Social 🌍</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root {
            --primary: #FF4B5C;
            --sky: #BAE6FD;
            --money: #10B981;
            --text: #1E293B;
            --sub: #64748B;
            --glass: rgba(255, 255, 255, 0.95);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--sky); margin: 0; color: var(--text); overflow-x: hidden; }

        /* Componentes de UI */
        .header { background: #fff; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.03); position: sticky; top: 0; z-index: 2000; }
        .header-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
        
        .aba { display: none; min-height: calc(100vh - 130px); padding-bottom: 90px; animation: fadeIn 0.3s ease; }
        .aba.ativa { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: white; margin: 15px; border-radius: 28px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        input, textarea, select { width: 100%; padding: 14px; margin: 8px 0; border: 1.5px solid #F1F5F9; border-radius: 14px; font-size: 15px; outline: none; background: #F8FAFC; }
        
        .btn { width: 100%; padding: 16px; border: none; border-radius: 18px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn-p { background: var(--primary); color: white; }
        .btn-m { background: var(--money); color: white; }

        /* Mapa e Feed */
        .mapa-full { height: calc(100vh - 145px); width: 100vw; background: white; position: relative; overflow: hidden; }
        #svg-container svg { width: 100% !important; height: 100% !important; display: block;}
        path { fill: #F1F5F9; stroke: #fff; stroke-width: 0.8; transition: 0.5s; cursor: pointer; }
        .visitado { fill: var(--primary) !important; }

        .feed-card { background: white; margin: 15px; border-radius: 30px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .carrossel { display: flex; overflow-x: auto; snap-type: x mandatory; height: 300px; background: #f1f5f9; }
        .carrossel img { flex: 0 0 100%; height: 100%; object-fit: cover; snap-align: center; }

        .exp-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
        .exp-item { background: #F8FAFC; border: 1.5px solid #F1F5F9; border-radius: 12px; padding: 10px; text-align: center; cursor: pointer; }

        .nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: var(--glass); display: flex; justify-content: space-around; align-items: center; z-index: 1000; border-top: 1px solid rgba(0,0,0,0.05); backdrop-filter: blur(10px); }
        .nav-item { font-size: 24px; opacity: 0.3; transition: 0.3s; cursor: pointer; }
        .nav-item.ativa { opacity: 1; color: var(--primary); transform: translateY(-5px); }

        #login-screen { position: fixed; inset: 0; background: linear-gradient(135deg, var(--sky) 0%, #fff 100%); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="modal-alerta" class="modal-custom">
        <div class="alert-box">
            <div id="alerta-icon" style="font-size: 40px; margin-bottom: 10px;">💡</div>
            <p id="alerta-msg" style="font-weight: 700;"></p>
            <button class="btn btn-m" onclick="fecharAlerta()">Ok!</button>
        </div>
    </div>

    <div id="login-screen">
        <div class="card" style="width: 100%; max-width: 360px; text-align: center;">
            <div style="font-size: 50px;">🌍</div>
            <h2 id="log-title">Bem-vindo(a)</h2>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn btn-p" onclick="handleAuth()" id="btn-auth-main">Entrar no Mapa</button>
            <p style="font-size: 13px; color: var(--sub); margin-top: 15px;" onclick="toggleAuthMode()">
                Não tem conta? <b id="auth-link" style="color: var(--primary); cursor: pointer;">Criar Jornada</b>
            </p>
        </div>
    </div>

    <div class="header">
        <div class="header-title">
            <h3 onclick="window.location.reload()" style="cursor:pointer">Nossa Jornada 🌍</h3>
            <span id="info-conquistas">ESTADOS: 0</span>
        </div>
        <div class="header-profile" onclick="mudarAba('perfil', document.getElementById('nav-perfil'))">
            <div style="text-align: right; line-height: 1.1;">
                <div id="h-nome" style="font-size: 12px; font-weight: 800;">...</div>
                <div id="h-user" style="font-size: 10px; color: var(--sub);">@...</div>
            </div>
            <img id="h-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="header-avatar">
        </div>
    </div>

    <div id="aba-feed" class="aba ativa">
        <div class="card" style="padding: 12px; margin-bottom: 5px;">
            <div style="display: flex; gap: 8px;">
                <input type="text" id="input-busca" placeholder="Buscar @username..." style="margin:0; padding: 10px;">
                <button class="btn btn-p" style="width: 50px; padding: 0;" onclick="buscarUsuario()">🔍</button>
            </div>
            <div id="resultado-busca" style="margin-top: 10px; display: none;"></div>
        </div>
        <div id="feed-container"></div>
    </div>

    <div id="aba-mapa" class="aba">
        <div class="mapa-full"><div id="svg-container"></div></div>
    </div>

    <div id="aba-registro" class="aba">
        <div class="card">
            <h4>Nova Viagem 📍</h4>
            <select id="sel-uf">
                <option value="" disabled selected>Selecionar Estado</option>
                <option value="BRAC">Acre</option><option value="BRAL">Alagoas</option><option value="BRAP">Amapá</option>
                <option value="BRAM">Amazonas</option><option value="BRBA">Bahia</option><option value="BRCE">Ceará</option>
                <option value="BRDF">Distrito Federal</option><option value="BRES">Espírito Santo</option>
                <option value="BRGO">Goiás</option><option value="BRMA">Maranhão</option><option value="BRMT">Mato Grosso</option>
                <option value="BRMS">Mato Grosso do Sul</option><option value="BRMG">Minas Gerais</option>
                <option value="BRPA">Pará</option><option value="BRPB">Paraíba</option><option value="BRPR">Paraná</option>
                <option value="BRPE">Pernambuco</option><option value="BRPI">Piauí</option><option value="BRRJ">Rio de Janeiro</option>
                <option value="BRRN">Rio Grande do Norte</option><option value="BRRS">Rio Grande do Sul</option>
                <option value="BRRO">Rondônia</option><option value="BRRR">Roraima</option><option value="BRSC">Santa Catarina</option>
                <option value="BRSP">São Paulo</option><option value="BRSE">Sergipe</option><option value="BRTO">Tocantins</option>
            </select>
            <input type="text" id="txt-cidade" placeholder="Cidade">
            <input type="date" id="txt-data">

            <label style="font-size: 11px; color: var(--sub);">Gastos (R$):</label>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <input type="number" id="v-hosp" placeholder="🏨 Hotel">
                <input type="number" id="v-trans" placeholder="🚗 Transp.">
                <input type="number" id="v-alime" placeholder="🍴 Aliment.">
                <input type="number" id="v-atrac" placeholder="🎡 Atrações">
            </div>
            
            <label style="font-size: 11px; color: var(--sub);">Tipo de Destino:</label>
            <div class="exp-group">
                <label class="exp-item"><span>🏖️</span> Praia?<input type="checkbox" id="chk-p"></label>
                <label class="exp-item"><span>🌳</span> Natureza?<input type="checkbox" id="chk-n"></label>
            </div>

            <input type="file" id="inp-fotos" multiple accept="image/*" onchange="previaFotos(this)">
            <div id="previa-container" style="display:flex; gap:5px; margin: 10px 0;"></div>
            
            <div style="background:#F8FAFC; padding:12px; border-radius:15px;">
                <label style="font-size: 11px;"><input type="checkbox" id="is-vip"> Permitir que VIPs vejam os gastos 💎</label>
            </div>
            <button class="btn btn-m" style="margin-top:15px;" onclick="postarViagem()">Salvar Memória 🚩</button>
        </div>
    </div>

    <div id="aba-gastos" class="aba"></div>

    <div id="aba-conquistas" class="aba">
        <div class="card">
            <h3>🏆 Suas Medalhas</h3>
            <div id="grid-conquistas" class="badge-grid"></div>
        </div>
    </div>

    <div id="aba-perfil" class="aba">
        <div class="card" style="text-align: center; position: relative; padding-top: 50px;">
            <div id="btn-edit-toggle" onclick="toggleModoPerfil()" style="position: absolute; right: 25px; top: 25px; font-size: 22px; cursor: pointer;">⚙️</div>
            
            <div id="perfil-modo-view">
                <img id="p-img-view" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover;">
                <h2 id="p-nome-view" style="margin: 10px 0 0; font-size: 24px;">...</h2>
                <p id="p-user-view" style="color: var(--primary); font-weight: 700; margin: 5px 0;">@user</p>
                <p id="p-bio-view" style="font-size: 14px; color: var(--sub); padding: 0 20px;">...</p>
                
                <div id="btn-vip-container" style="display:none; margin-top:15px;">
                    <button class="btn btn-m" style="padding:10px;" onclick="tornarAmigoVip()">💎 Tornar VIP</button>
                </div>
            </div>

            <div id="perfil-modo-edit" style="display: none;">
                <input type="text" id="edit-nome" placeholder="Nome">
                <input type="text" id="edit-user" placeholder="username" oninput="verificarDisponibilidade(this.value)">
                <div id="status-username" style="font-size: 10px; font-weight: 700;"></div>
                <textarea id="edit-bio" placeholder="Sua biografia..."></textarea>
                <button class="btn btn-p" onclick="salvarPerfil()">Salvar</button>
            </div>

            <div id="notificacoes-convites" style="margin-top: 20px; text-align: left;"></div>
            <div id="timeline-perfil" style="margin-top:20px;"></div>
            <hr style="border: 0; border-top: 1px solid #F1F5F9; margin: 20px 0;">
            <button onclick="auth.signOut()" style="color: var(--primary); border: none; background: none; font-weight: 800; cursor: pointer;">Sair</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item ativa" onclick="mudarAba('feed', this)">🏠</div>
        <div class="nav-item" onclick="mudarAba('mapa', this)">📍</div>
        <div class="nav-item" onclick="mudarAba('registro', this)">➕</div>
        <div class="nav-item" onclick="mudarAba('gastos', this)">💰</div>
        <div class="nav-item" onclick="mudarAba('conquistas', this)">🏆</div>
        <div class="nav-item" id="nav-perfil" onclick="mudarAba('perfil', this)">👤</div>
    </nav>

    <script>
        // CONFIGURAÇÕES FIREBASE (Mantenha as suas originais)
        const firebaseConfig = {
            apiKey: "AIzaSyC6C5dJZeRF6Ylx4x-eWex6s2WGdRiMqbg",
            authDomain: "pjrsddinst-00.firebaseapp.com",
            projectId: "pjrsddinst-00",
            storageBucket: "pjrsddinst-00.firebasestorage.app",
            messagingSenderId: "500429246053",
            appId: "1:500429246053:web:0af4090351346a0513808c",
            databaseURL: "https://pjrsddinst-00-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let me = null, isLogin = true, fotosPost = [], controleMapa = null, perfilAtual = {}, usernameDisponivel = true, uidVisitado = null;

        // --- SISTEMA DE ALERTA ---
        function customAlerta(msg, icon = '💡') {
            document.getElementById('alerta-msg').innerText = msg;
            document.getElementById('alerta-icon').innerText = icon;
            document.getElementById('modal-alerta').style.display = 'flex';
        }
        function fecharAlerta() { document.getElementById('modal-alerta').style.display = 'none'; }
        
        function toggleAuthMode() {
            isLogin = !isLogin;
            document.getElementById('log-title').innerText = isLogin ? "Bem-vindo(a)" : "Criar Jornada";
            document.getElementById('btn-auth-main').innerText = isLogin ? "Entrar" : "Cadastrar";
        }

        // --- AUTENTICAÇÃO ---
        async function handleAuth() {
            const e = document.getElementById('email').value.trim();
            const p = document.getElementById('pass').value;
            const btn = document.getElementById('btn-auth-main');
            if (!e || !p) return customAlerta("Preencha todos os campos!", "⚠️");
            btn.disabled = true; btn.innerText = "A processar...";
            try {
                if (isLogin) { await auth.signInWithEmailAndPassword(e, p); }
                else {
                    const res = await auth.createUserWithEmailAndPassword(e, p);
                    const idTemp = "user_" + Math.floor(Math.random() * 9999);
                    await db.ref('usuarios/' + res.user.uid + '/perfil').set({ nome: "Novo Viajante", username: idTemp, estados: 0, foto: 'https://cdn-icons-png.flaticon.com/512/149/149071.png', bio: "Olá! 🌍" });
                    await db.ref(`usernames/${idTemp}`).set(res.user.uid);
                }
            } catch (err) {
                let msg = "Erro ao acessar.";
                if(err.code === "auth/wrong-password") msg = "Senha incorreta.";
                if(err.code === "auth/user-not-found") msg = "E-mail não cadastrado.";
                customAlerta(msg, '❌');
            } finally { btn.disabled = false; btn.innerText = isLogin ? "Entrar" : "Cadastrar"; }
        }

        auth.onAuthStateChanged(user => {
            if(user) { me = user; document.getElementById('login-screen').style.display = 'none'; initApp(); }
            else { document.getElementById('login-screen').style.display = 'flex'; }
        });

        // --- INICIALIZAÇÃO ---
        async function initApp() {
            // Carregar Perfil do Usuário Logado
            db.ref('usuarios/' + me.uid + '/perfil').on('value', snap => {
                perfilAtual = snap.val() || {};
                const foto = perfilAtual.foto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                document.getElementById('h-avatar').src = foto;
                document.getElementById('h-nome').innerText = perfilAtual.nome;
                document.getElementById('h-user').innerText = '@' + perfilAtual.username;
                document.getElementById('info-conquistas').innerText = `ESTADOS: ${perfilAtual.estados || 0}`;
                
                // Se não estivermos visitando ninguém, mostra o nosso perfil
                if(!uidVisitado) carregarDadosPerfil(me.uid);
            });

            // Carregar Mapa
            try {
                const res = await fetch('br.svg');
                const svgText = await res.text();
                document.getElementById('svg-container').innerHTML = svgText;
                const svgEl = document.querySelector('#svg-container svg');
                setTimeout(() => { 
                    controleMapa = svgPanZoom(svgEl, { zoomEnabled: true, controlIconsEnabled: false, fit: true, center: true }); 
                    pintarMapa(me.uid);
                }, 500);
            } catch (e) { console.error("Erro mapa"); }

            escutarConvites();
            renderFeed();
        }

        // --- NAVEGAÇÃO ---
        function mudarAba(id, el) {
            if(id === 'perfil' && uidVisitado === null) uidVisitado = me.uid; 
            document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('ativa'));
            document.getElementById('aba-' + id).classList.add('ativa');
            if(el) el.classList.add('ativa');
            
            if(id === 'mapa') {
                pintarMapa(uidVisitado || me.uid);
                if(controleMapa) setTimeout(() => controleMapa.resize().fit().center(), 100);
            }
            if(id === 'conquistas') renderJornada();
            if(id === 'gastos') renderRelatorioPrivado();
            if(id === 'feed') { uidVisitado = null; renderFeed(); }
            if(id === 'perfil') carregarDadosPerfil(uidVisitado || me.uid);
        }

        // --- MAPA ---
        function pintarMapa(uid) {
            db.ref(`usuarios/${uid}/viagens`).once('value', snap => {
                const viagens = snap.val() || {};
                document.querySelectorAll('path').forEach(p => p.classList.remove('visitado'));
                Object.values(viagens).forEach(t => { 
                    const el = document.getElementById(t.uf); 
                    if(el) el.classList.add('visitado'); 
                });
            });
        }

        // --- BUSCA E AMIZADE ---
        async function buscarUsuario() {
            const userBusca = document.getElementById('input-busca').value.toLowerCase().trim().replace('@','');
            const resDiv = document.getElementById('resultado-busca');
            if (!userBusca) return;
            const snap = await db.ref(`usernames/${userBusca}`).once('value');
            const uid = snap.val();
            if (!uid) return customAlerta("Usuário não encontrado!", "❌");
            
            const pSnap = await db.ref(`usuarios/${uid}/perfil`).once('value');
            const p = pSnap.val();
            resDiv.style.display = "block";
            resDiv.innerHTML = `
                <div style="display:flex; align-items:center; justify-content:space-between; padding:10px; background:#f8fafc; border-radius:15px; border:1px solid #eee">
                    <div onclick="verPerfilExterno('${uid}')" style="cursor:pointer">
                        <b>${p.nome}</b><br><small>@${p.username}</small>
                    </div>
                    <button class="btn btn-m" style="width:auto; padding:5px 10px; font-size:12px;" onclick="enviarConvite('${uid}')">Convidar</button>
                </div>`;
        }

        async function verPerfilExterno(uid) {
            uidVisitado = uid;
            mudarAba('perfil', document.getElementById('nav-perfil'));
        }

        async function carregarDadosPerfil(uid) {
            const snap = await db.ref(`usuarios/${uid}/perfil`).once('value');
            const p = snap.val();
            if(!p) return;

            document.getElementById('p-img-view').src = p.foto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            document.getElementById('p-nome-view').innerText = p.nome;
            document.getElementById('p-user-view').innerText = '@' + p.username;
            document.getElementById('p-bio-view').innerText = p.bio;

            // Mostrar/Esconder botão de edição
            document.getElementById('btn-edit-toggle').style.display = (uid === me.uid) ? 'block' : 'none';
            
            // Botão VIP (Apenas se for perfil de amigo)
            const vipBtn = document.getElementById('btn-vip-container');
            if(uid !== me.uid) {
                vipBtn.style.display = 'block';
            } else {
                vipBtn.style.display = 'none';
            }

            renderTimeline(uid);
        }

        async function tornarAmigoVip() {
            if(!uidVisitado) return;
            await db.ref(`usuarios/${me.uid}/vips/${uidVisitado}`).set(true);
            customAlerta("Amigo agora é VIP!", "💎");
        }

        async function enviarConvite(uid) {
            if(uid === me.uid) return;
            await db.ref(`convites/${uid}/${me.uid}`).set({ de_uid: me.uid, de_username: perfilAtual.username, de_foto: perfilAtual.foto || '' });
            customAlerta("Pedido enviado!", "📩");
            document.getElementById('resultado-busca').style.display = "none";
        }

        function escutarConvites() {
            db.ref(`convites/${me.uid}`).on('value', snap => {
                const convites = snap.val();
                const container = document.getElementById('notificacoes-convites');
                container.innerHTML = convites ? "<h4 style='font-size:12px'>🔔 Pedidos</h4>" : "";
                for (let id in convites) {
                    const c = convites[id];
                    container.innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; padding:10px; background:#f1f5f9; border-radius:10px; margin-bottom:5px;">
                        <span style="font-size:12px">@${c.de_username}</span>
                        <button onclick="responderConvite('${id}', true)" style="background:var(--money); color:white; border:none; border-radius:5px; padding:5px 10px; font-size:10px;">Aceitar</button>
                    </div>`;
                }
            });
        }

        async function responderConvite(id, aceitou) {
            if (aceitou) {
                await db.ref(`usuarios/${me.uid}/amigos/${id}`).set(true);
                await db.ref(`usuarios/${id}/amigos/${me.uid}`).set(true);
                customAlerta("Conectados!", "🤝");
            }
            await db.ref(`convites/${me.uid}/${id}`).remove();
        }

        // --- POSTAGEM E FEED ---
        async function postarViagem() {
            const uf = document.getElementById('sel-uf').value;
            const cidade = document.getElementById('txt-cidade').value;
            if (!uf || !cidade) return customAlerta("Preencha o local!", "⚠️");
            
            const vH = parseFloat(document.getElementById('v-hosp').value) || 0;
            const vT = parseFloat(document.getElementById('v-trans').value) || 0;
            const vA = parseFloat(document.getElementById('v-alime').value) || 0;
            const vAt = parseFloat(document.getElementById('v-atrac').value) || 0;
            
            const id = Date.now();
            const post = { 
                id, uid: me.uid, username: perfilAtual.username, uFoto: perfilAtual.foto || '', 
                uf, cidade, total: (vH+vT+vA+vAt), fotos: fotosPost,
                exp: { h: vH>0, t: vT>0, a: vA>0, atr: vAt>0, p: document.getElementById('chk-p').checked, n: document.getElementById('chk-n').checked } 
            };
            
            await db.ref('feed_global/' + id).set(post);
            await db.ref(`usuarios/${me.uid}/viagens/${id}`).set(post);
            
            customAlerta("Viagem Salva!", "✅");
            mudarAba('feed', document.querySelector('.nav-item'));
            // Limpeza
            document.getElementById('txt-cidade').value = "";
            document.getElementById('previa-container').innerHTML = "";
            fotosPost = [];
        }

        async function temPermissaoParaVerGasto(uid) {
            if (me.uid === uid) return true;
            const vipsSnap = await db.ref(`usuarios/${uid}/vips/${me.uid}`).once('value');
            return vipsSnap.exists();
        }

        function renderFeed() {
            db.ref('feed_global').limitToLast(20).on('value', async snap => {
                const container = document.getElementById('feed-container');
                container.innerHTML = "";
                const posts = snap.val() || {};
                const lista = Object.values(posts).reverse();

                for (let p of lista) {
                    const podeVer = await temPermissaoParaVerGasto(p.uid);
                    container.innerHTML += `
                        <div class="feed-card">
                            <div style="padding:15px; display:flex; align-items:center; gap:10px;">
                                <img src="${p.uFoto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" style="width:30px; height:30px; border-radius:50%">
                                <b onclick="verPerfilExterno('${p.uid}')" style="cursor:pointer">@${p.username}</b> em ${p.cidade}
                            </div>
                            <div class="carrossel">${p.fotos ? p.fotos.map(f => `<img src="${f}">`).join('') : ''}</div>
                            <div style="padding:15px; display:flex; justify-content:space-between; align-items:center;">
                                <div style="font-size:18px">
                                    ${p.exp.h?'🏨':''} ${p.exp.t?'🚗':''} ${p.exp.a?'🍴':''} ${p.exp.p?'🏖️':''} ${p.exp.n?'🌳':''}
                                </div>
                                <b style="color:var(--money)">${podeVer ? 'R$ '+p.total.toLocaleString() : '🔒 VIP'}</b>
                            </div>
                        </div>`;
                }
            });
        }

        function renderTimeline(uid) {
            db.ref(`usuarios/${uid}/viagens`).on('value', snap => {
                const container = document.getElementById('timeline-perfil');
                const viagens = snap.val() || {};
                container.innerHTML = "<h4>📍 Linha do Tempo</h4>";
                Object.values(viagens).reverse().forEach(v => {
                    container.innerHTML += `
                        <div style="text-align:left; padding:10px; border-left:2px solid var(--primary); margin-left:10px; margin-bottom:10px;">
                            <small>${v.uf.replace('BR','')}</small> - <b>${v.cidade}</b>
                        </div>`;
                });
            });
        }

        // --- RELATÓRIOS ---
        function renderRelatorioPrivado() {
            db.ref(`usuarios/${me.uid}/viagens`).on('value', snap => {
                let total = 0;
                Object.values(snap.val() || {}).forEach(v => total += (v.total || 0));
                document.getElementById('aba-gastos').innerHTML = `
                    <div class="card" style="text-align:center">
                        <h3>💰 Relatório de Investimento</h3>
                        <div style="background:var(--money); color:white; padding:30px; border-radius:20px;">
                            <small>TOTAL GASTO EM VIAGENS</small>
                            <h2 style="margin:0">R$ ${total.toLocaleString('pt-BR')}</h2>
                        </div>
                    </div>`;
            });
        }

        // --- PERFIL EDIT ---
        async function verificarDisponibilidade(user) {
            const input = user.toLowerCase().trim().replace(/[^a-z0-9_]/g, "");
            document.getElementById('edit-user').value = input;
            if (input.length < 3) return;
            const snap = await db.ref(`usernames/${input}`).once('value');
            usernameDisponivel = !snap.val() || snap.val() === me.uid;
            const st = document.getElementById('status-username');
            st.innerText = usernameDisponivel ? "✓ Disponível" : "✕ Em uso";
            st.style.color = usernameDisponivel ? "var(--money)" : "var(--primary)";
        }

        async function salvarPerfil() {
            if (!usernameDisponivel) return customAlerta("Username ocupado!");
            const novo = document.getElementById('edit-user').value.toLowerCase().trim();
            const antigo = perfilAtual.username;
            
            const updates = { nome: document.getElementById('edit-nome').value, username: novo, bio: document.getElementById('edit-bio').value };
            await db.ref(`usuarios/${me.uid}/perfil`).update(updates);
            await db.ref(`usernames/${novo}`).set(me.uid);
            if(antigo && antigo !== novo) db.ref(`usernames/${antigo}`).remove();
            
            toggleModoPerfil();
            customAlerta("Perfil Salvo!", "✅");
        }

        function toggleModoPerfil() {
            const v = document.getElementById('perfil-modo-view'), e = document.getElementById('perfil-modo-edit');
            const editando = v.style.display === 'none';
            v.style.display = editando ? 'block' : 'none';
            e.style.display = editando ? 'none' : 'block';
            if(!editando) {
                document.getElementById('edit-nome').value = perfilAtual.nome;
                document.getElementById('edit-user').value = perfilAtual.username;
                document.getElementById('edit-bio').value = perfilAtual.bio;
            }
        }

        // --- FOTOS ---
        async function processarFotoPerfil(input) {
            if (input.files[0]) {
                const b64 = await esmagarFoto(input.files[0], 300);
                await db.ref(`usuarios/${me.uid}/perfil/foto`).set(b64);
            }
        }

        async function esmagarFoto(file, size = 600) {
            return new Promise(resolve => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = e => {
                    const img = new Image(); img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                        canvas.width = size; canvas.height = size * (img.height/img.width);
                        ctx.drawImage(img, 0, 0, size, canvas.height); resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                };
            });
        }

        async function previaFotos(input) {
            fotosPost = []; document.getElementById('previa-container').innerHTML = "";
            for(let f of Array.from(input.files).slice(0, 3)) {
                const b64 = await esmagarFoto(f); fotosPost.push(b64);
                document.getElementById('previa-container').innerHTML += `<img src="${b64}" style="width:50px; height:50px; border-radius:10px; object-fit:cover;">`;
            }
        }

        function renderJornada() {
            const estados = perfilAtual.estados || 0;
            const conquistas = [
                {n:1, t:'Início', i:'🌱'}, {n:5, t:'Explorador', i:'🏃'}, 
                {n:10, t:'Aventureiro', i:'⭐'}, {n:20, t:'Pelo Brasil', i:'🔥'}, {n:26, t:'Mestre', i:'👑'}
            ];
            let html = '';
            conquistas.forEach(c => {
                const ativo = estados >= c.n;
                html += `<div class="badge ${ativo?'active':''}">
                    <div class="b-icon">${c.i}</div>
                    <div style="font-size:10px; font-weight:800;">${c.t}</div>
                </div>`;
            });
            document.getElementById('grid-conquistas').innerHTML = html;
        }
    </script>
</body>
</html>
