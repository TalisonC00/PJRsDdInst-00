        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root {
            --primary: #FF4B5C;
            --sky: #BAE6FD;
            --money: #10B981;
            --text: #1E293B;
            --sub: #64748B;
            --glass: rgba(255, 255, 255, 0.95);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--sky); margin: 0; color: var(--text); overflow-x: hidden; }

        /* HEADER COM PERFIL ALINHADO À DIREITA */
        .header { 
            background: #fff; 
            padding: 10px 16px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); 
            position: sticky; 
            top: 0; 
            z-index: 2000; 
        }
        .header-title { flex: 1; }
        .header h3 { margin: 0; font-size: 16px; color: var(--primary); font-weight: 800; }
        #info-conquistas { font-size: 9px; font-weight: 800; color: var(--sub); text-transform: uppercase; }
        
        .header-profile { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .header-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }

        /* TELAS */
        .aba { display: none; min-height: calc(100vh - 130px); padding-bottom: 90px; animation: fadeIn 0.3s ease; }
        .aba.ativa { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* CARDS E FORMULÁRIOS */
        .card { background: white; margin: 15px; border-radius: 28px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        input, textarea, select { width: 100%; padding: 14px; margin: 8px 0; border: 1.5px solid #F1F5F9; border-radius: 14px; font-size: 15px; outline: none; background: #F8FAFC; font-family: inherit; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 18px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn-p { background: var(--primary); color: white; }
        .btn-m { background: var(--money); color: white; }

        /* MAPA FULL */
        .mapa-full { height: calc(100vh - 145px); width: 100vw; background: white; position: relative; overflow: hidden; }
        #svg-container { width: 100%; height: 100%; }
        path { fill: #F1F5F9; stroke: #fff; stroke-width: 0.8; transition: 0.5s; cursor: pointer; }
        .visitado { fill: var(--primary) !important; }

        /* FORMULÁRIO DE EXPERIÊNCIAS (GRID) */
        .exp-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .exp-item { background: #F8FAFC; border: 1.5px solid #F1F5F9; border-radius: 12px; padding: 10px; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .exp-item span { font-size: 20px; }
        .exp-item input { width: 16px; height: 16px; margin: 0; }

        /* FEED E RANKING */
        .feed-card { background: white; margin: 15px; border-radius: 30px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .carrossel { display: flex; overflow-x: auto; snap-type: x mandatory; height: 320px; scrollbar-width: none; background: #f1f5f9; }
        .carrossel img { flex: 0 0 100%; height: 100%; object-fit: cover; snap-align: center; }
        .pill { background: #F1F5F9; padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }

        /* CONQUISTAS */
        .badge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .badge { text-align: center; opacity: 0.2; filter: grayscale(1); transition: 0.4s; }
        .badge.active { opacity: 1; filter: grayscale(0); }
        .b-icon { width: 60px; height: 60px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto 8px; }

        /* ALERTAS CUSTOMIZADOS */
        .modal-custom { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 5000; display: none; align-items: center; justify-content: center; }
        .alert-box { background: white; padding: 25px; border-radius: 28px; width: 85%; max-width: 320px; text-align: center; }

        /* NAV */
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: var(--glass); display: flex; justify-content: space-around; align-items: center; z-index: 1000; border-top: 1px solid rgba(0,0,0,0.05); }
        .nav-item { font-size: 24px; opacity: 0.3; transition: 0.3s; }
        .nav-item.ativa { opacity: 1; color: var(--primary); transform: translateY(-5px); }

        #login-screen { position: fixed; inset: 0; background: linear-gradient(135deg, var(--sky) 0%, #fff 100%); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }

        function traduzirErro(codigo) {
    switch (codigo) {
        case 'auth/email-already-in-use': return "Este e-mail já está a ser utilizado.";
        case 'auth/invalid-email': return "O e-mail digitado não é válido.";
        case 'auth/weak-password': return "A senha deve ter pelo menos 6 caracteres.";

        case 'auth/wrong-password': return "Senha incorreta.";

    }
}
        
        function toggleModoPerfil() {

        async function handleAuth() {
    const e = document.getElementById('email').value.trim();
    const p = document.getElementById('pass').value;
    const btn = document.getElementById('btn-auth-main');

    if (!e || !p) return customAlerta("Preenche todos os campos!", "⚠️");

    // Bloqueia o botão para evitar cliques repetidos
    btn.disabled = true;
    btn.innerText = "A processar...";

    try {
        if (isLogin) {
            // LOGIN
            await auth.signInWithEmailAndPassword(e, p);
        } else {
            // CADASTRO

            // Criamos o perfil inicial básico

            await db.ref('usuarios/' + res.user.uid + '/perfil').set({

                username: idTemporario,
                estados: 0,
                foto: 'https://cdn-icons-png.flaticon.com/512/149/149071.png',
                bio: "Comecei a minha jornada! 🌍"
            });

            // Regista o username temporário no nosso índice
            await db.ref(`usernames/${idTemporario}`).set(res.user.uid);
        }
    } catch (err) {
        customAlerta(traduzirErro(err.code), '❌');
        btn.disabled = false;
        btn.innerText = isLogin ? "Entrar" : "Cadastrar";
    }
}

        // APP LOGIC
        function mudarAba(id, el) {
    document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('ativa'));
    document.getElementById('aba-' + id).classList.add('ativa');

    if(id === 'ranking') renderRanking();
    if(id === 'conquistas') renderJornada();
    if(id === 'gastos') renderRelatorioPrivado(); // Chama o relatório privado

async function buscarUsuario() {
    const userBusca = prompt("Digite o @username que deseja encontrar:").toLowerCase().trim();
    if (!userBusca) return;

    // 1. Procura o UID através do índice de usernames que criamos
    const snap = await db.ref(`usernames/${userBusca}`).once('value');

        abrirPerfilVisitante(uidEncontrado);
    } else {

        // COMPACTADOR DE FOTOS
        async function esmagarFoto(file) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = e => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = 600;
                        canvas.height = 600 * (img.height/img.width);
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                };
            });
        }

        async function previaFotos(input) {
            fotosPost = [];
            const container = document.getElementById('previa-container');
            container.innerHTML = "";
            for(let f of Array.from(input.files).slice(0, 3)) {
                const b64 = await esmagarFoto(f);
                fotosPost.push(b64);
                container.innerHTML += `<img src="${b64}" style="width:40px; height:40px; border-radius:8px; object-fit:cover;">`;
            }
        }

    const novaViagem = {
        id: tripID,
        uid: me.uid,
        username: perfilAtual.username,
        uFoto: perfilAtual.foto || '',
        uf: uf,
        cidade: document.getElementById('txt-cidade').value,
        data: document.getElementById('txt-data').value,
        fotos: fotosPost, // Array de base64
        gastos: gastos,
        total: total,
        isVip: document.getElementById('is-vip').checked // Se true, só VIPs vêm o 'total'
    };

    // 1. Salva no perfil do usuário (Privado/Completo)
    await db.ref(`usuarios/${me.uid}/viagens/${tripID}`).set(novaViagem);

    // 2. Salva no Feed Global (Público - sem os gastos detalhados por segurança)
    const postPublico = { ...novaViagem };
    if (!novaViagem.isVip) delete postPublico.gastos; // Remove gastos se não for público
    
    await db.ref('feed_global/' + tripID).set(postPublico);

    // 3. Atualiza contador de estados
    db.ref(`usuarios/${me.uid}/viagens`).once('value', s => {
        const viagens = s.val() || {};
        const estadosUnicos = [...new Set(Object.values(viagens).map(v => v.uf))].length;
        db.ref(`usuarios/${me.uid}/perfil/estados`).set(estadosUnicos);
    });

    customAlerta("Viagem publicada no Feed! 🌍", "✅");
    mudarAba('feed', document.querySelector('.nav-item'));
}

        async function renderFeed() {
    const snap = await db.ref('feed_global').limitToLast(15).once('value');
    const posts = snap.val() || {};
    const container = document.getElementById('feed-container');
    container.innerHTML = "";

    for (let id in posts) {
        const p = posts[id];
        
        // Chamamos a nossa função de permissão
        const podeVer = await temPermissaoParaVerGasto(p.uid);
        
        // Definimos o que será exibido no campo de valor
        const valorTexto = podeVer 
            ? `R$ ${parseFloat(p.total).toLocaleString('pt-BR')}` 
            : "🔒 Conteúdo VIP";

        container.innerHTML += `
            <div class="feed-card">
                <div class="user-info">
                    <img src="${p.uFoto || 'link_padrao'}" class="avatar">
                    <span><b>@${p.username}</b> em ${p.cidade}</span>
                </div>
                <div class="carrossel">${p.fotos ? p.fotos.map(f => `<img src="${f}">`).join('') : ''}</div>
                <div style="padding:15px; display:flex; justify-content:space-between; align-items:center;">
                    <div class="pills-exp">${p.exp.h?'🏨':''} ${p.exp.a?'🍴':''}</div>
                    <span style="font-weight:800; color:var(--money); font-size:14px;">
                        ${valorTexto}
                    </span>
                </div>
            </div>`;
    }
}

        
        function renderRelatorioPrivado() {

        const viagens = snap.val() || {};
        const container = document.getElementById('aba-gastos');

        container.innerHTML = `

                <h3>💰 Meu Relatório</h3>

                    <small>INVESTIMENTO TOTAL</small>
                    <h2 style="margin:5px 0;">R$ ${totalGeral.toLocaleString('pt-BR')}</h2>

        function verPerfilAmigo(uidAmigo) {
    db.ref(`usuarios/${uidAmigo}`).once('value', snap => {
        const dados = snap.val();
        // 1. Pintar o mapa com as viagens do AMIGO

        // Verifica se eu posso ver os gastos de um determinado post
async function temPermissaoParaVerGasto(uidDoDono doPost) {
    if (me.uid === uidDoDono) return true; // Eu sempre vejo os meus gastos

    // Verifica se estou na lista VIP do dono do post
    const vipsSnap = await db.ref(`usuarios/${uidDoDono}/vips/${me.uid}`).once('value');
    return vipsSnap.exists();
}
        
        async function adicionarVipManual() {
    const idAmigo = prompt("Insira o ID único do seu amigo para torná-lo VIP:");
    
    if (idAmigo && idAmigo.trim() !== "") {
        try {
            // Guardamos no nó de VIPs do utilizador atual
            await db.ref(`usuarios/${me.uid}/vips/${idAmigo}`).set(true);
            customAlerta("Amigo adicionado aos VIPs!", "✅");
        } catch (error) {
            customAlerta("Erro ao adicionar.", "❌");
        }
    }}

        async function verificarDisponibilidade(user) {
    const statusEl = document.getElementById('status-username');
    const input = user.toLowerCase().trim().replace(/[^a-z0-9_]/g, ""); // Limpa caracteres especiais
    
    // Atualiza o input visualmente (opcional, para forçar o padrão)
    document.getElementById('edit-user').value = input;

    if (input.length < 3) {
        statusEl.innerText = "Mínimo 3 caracteres";
        statusEl.style.color = "orange";
        usernameDisponivel = false;
        return;
    }

    // Consulta o índice de usernames
    const snap = await db.ref(`usernames/${input}`).once('value');
    const donoDoId = snap.val();

    // Se ninguém for dono OU se o dono for o próprio utilizador atual
    if (!donoDoId || donoDoId === me.uid) {
        statusEl.innerText = "✓ Username disponível";
        statusEl.style.color = "var(--money)";
        usernameDisponivel = true;
    } else {
        statusEl.innerText = "✕ Este username já está em uso";
        statusEl.style.color = "var(--primary)";
        usernameDisponivel = false;
    }
}
        async function buscarDadosComPermissao(uidPerfilVisitado) {
    // 1. Procurar os dados do perfil que estamos a visitar
    const snap = await db.ref(`usuarios/${uidPerfilVisitado}`).once('value');
    const dados = snap.val();
    
    // 2. Verificar se EU (me.uid) estou na lista de VIPs dele
    const souVip = dados.vips && dados.vips[me.uid] === true;
    
    // 3. Se for o meu próprio perfil, eu sou sempre VIP de mim mesmo
    const eMeuProprioPerfil = me.uid === uidPerfilVisitado;

    return {
        ...dados,
        podeVerGastos: souVip || eMeuProprioPerfil
    };
}
        
        function renderJornada() {
            const estados = perfilAtual.estados || 0;
            const conquistas = [
                {n:1, t:'Início', i:'🌱'}, {n:5, t:'Explorador', i:'🏃'}, 
                {n:10, t:'Aventureiro', i:'⭐'}, {n:20, t:'Pelo Brasil', i:'🔥'}, {n:26, t:'Mestre', i:'👑'}
            ];
            let html = '';
            conquistas.forEach(c => {
                const ativo = estados >= c.n;
                html += `<div class="badge ${ativo?'active':''}">
                    <div class="b-icon">${c.i}</div>
                    <div style="font-size:10px; font-weight:800;">${c.t}</div>
                </div>`;
            });
            document.getElementById('grid-conquistas').innerHTML = html;
        }

        async function salvarPerfil() {
    if (!usernameDisponivel) {
        return customAlerta("Por favor, escolhe um username disponível antes de salvar.", "💡");
    }

    const novoUser = document.getElementById('edit-user').value.toLowerCase().trim();
    const antigoUser = perfilAtual.username; // Pegamos o nome que ele tinha antes

    const updates = {
        nome: document.getElementById('edit-nome').value,
        username: novoUser,
        bio: document.getElementById('edit-bio').value
    };

    // 1. Atualiza o perfil do usuário
    await db.ref(`usuarios/${me.uid}/perfil`).update(updates);

    // 2. Cria a ligação no índice global (Username -> ID)
    await db.ref(`usernames/${novoUser}`).set(me.uid);

    // 3. Se ele mudou de nome, removemos o antigo do índice para outros poderem usar
    if (antigoUser && antigoUser !== novoUser) {
        db.ref(`usernames/${antigoUser}`).remove();
    }

    customAlerta("Perfil Atualizado!", "✅");
    toggleModoPerfil();
}

        async function processarFotoPerfil(input) {
            if (input.files[0]) {
                const b64 = await esmagarFoto(input.files[0]);
                await db.ref(`usuarios/${me.uid}/perfil/foto`).set(b64);
                customAlerta("Foto alterada!", "📸");
            }
        }

        async function initApp() {
    // 1. ESCUTAR PERFIL (Header e Tela de Perfil)
    db.ref('usuarios/' + me.uid + '/perfil').on('value', snap => {
        perfilAtual = snap.val() || {};
        const foto = perfilAtual.foto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';

        document.getElementById('h-avatar').src = foto;
        document.getElementById('h-nome').innerText = perfilAtual.nome || 'Viajante';
        document.getElementById('h-user').innerText = '@' + (perfilAtual.username || 'user');
        document.getElementById('info-conquistas').innerText = `ESTADOS: ${perfilAtual.estados || 0}`;

        document.getElementById('p-img-view').src = foto;
        document.getElementById('p-nome-view').innerText = perfilAtual.nome || 'Viajante';
        document.getElementById('p-user-view').innerText = '@' + (perfilAtual.username || 'user');
        document.getElementById('p-bio-view').innerText = perfilAtual.bio || 'Bem-vindo à minha jornada!';
        
        document.getElementById('p-img').src = foto;
    });

    // 2. CARREGAR E CONFIGURAR O MAPA SVG
    try {
        const res = await fetch('br.svg');
        const svgText = await res.text();
        const container = document.getElementById('svg-container');
        
        // Inserimos o SVG no container
        container.innerHTML = svgText;

        const svgEl = container.querySelector('svg');
        if (svgEl) {
            // Ajustes de estilo forçados para garantir visibilidade
            svgEl.style.width = "100%";
            svgEl.style.height = "100%";
            svgEl.style.display = "block";

            // Inicializa a biblioteca de Zoom
            // Usamos um pequeno delay para garantir que o navegador calculou o tamanho do SVG
            setTimeout(() => {
                controleMapa = svgPanZoom(svgEl, {
                    zoomEnabled: true,
                    controlIconsEnabled: false,
                    fit: true,
                    center: true,
                    minZoom: 0.5,
                    maxZoom: 10
                });
            }, 300);
        }
    } catch (err) {
        console.error("Erro ao carregar o arquivo br.svg:", err);
    }

    // 3. ESCUTAR VIAGENS PARA PINTAR O MAPA
    // Usamos o UID do usuário logado para garantir que ele veja o mapa DELE
    db.ref(`usuarios/${me.uid}/viagens`).on('value', snap => {
        const viagens = snap.val() || {};
        
        // Primeiro, limpamos todos os estados (removemos a classe visitado)
        document.querySelectorAll('path').forEach(p => p.classList.remove('visitado'));
        
        // Pintamos os estados que possuem registros de viagem
        // Importante: No seu código de casal, os dados eram agrupados por UF.
        // Aqui garantimos que ele pegue as chaves ou o campo 'uf' do post.
        Object.values(viagens).forEach(trip => {
            const el = document.getElementById(trip.uf);
            if (el) el.classList.add('visitado');
        });
    });

    // 4. CARREGAR O FEED INICIAL
    renderFeed();
}
